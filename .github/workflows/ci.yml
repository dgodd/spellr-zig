name: Spellr Zig CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build
        run: zig build

      - name: Run tests
        run: zig test root.zig 2>&1|cat

      - name: Run spell check
        run: ./zig-out/bin/spellr
